name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Compile helper scripts
        run: python -m py_compile skills/loop-engineering/scripts/*.py
      - name: Check public hygiene
        run: |
          ! grep -R -n -E '/Users/apple|docs/superpowers|biology learning workbench|PPT readiness|经理Agent|计划Agent|执行Agent|审查Agent|仲裁Agent|未命名文件夹|截屏2026|生图|wuzuapi|apicodex|token\.txt|sk-[A-Za-z0-9_-]{20,}|ghp_[A-Za-z0-9_]{20,}|github_pat_|BEGIN (RSA|OPENSSH|PRIVATE)' \
            --exclude-dir=.git --exclude-dir=.github --exclude-dir=__pycache__ .
